# ??? Servidor ???????????????????????????????????????????????
server.port=8080

# ??? Base de datos H2 (en memoria) ??????????????????????????
spring.datasource.url=jdbc:h2:file:./data/analiticadb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ??? JPA / Hibernate ????????????????????????????????????????
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ??? Consola H2 (util para ver los datos en desarrollo) ?????
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ??? JWT ????????????????????????????????????????????????????
# Clave secreta (minimo 256 bits para HS256)
jwt.secret=clave-super-secreta-proyecto-analitica-universidad-2026
jwt.expiracion-ms=86400000

spring.mvc.cors.allowed-origins=*
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*